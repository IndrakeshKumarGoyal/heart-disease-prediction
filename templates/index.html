<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Heart Disease Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#eef5ff;

font-family:Arial,Helvetica,sans-serif;

}

.navbar{

background:#0d6efd;

}

.navbar-brand{

font-size:28px;

font-weight:bold;

color:white !important;

}

.hero{

text-align:center;

padding:30px;

}

.hero h1{

font-size:38px;

font-weight:bold;

color:#0d6efd;

}

.hero p{

font-size:18px;

color:gray;

}

.card{

border:none;

border-radius:15px;

box-shadow:0px 0px 15px rgba(0,0,0,.2);

padding:20px;

margin-bottom:30px;

}

label{

font-weight:bold;

margin-top:10px;

}

.btn-primary{

width:100%;

padding:12px;

font-size:20px;

}

.result{

margin-top:25px;

font-size:25px;

text-align:center;

font-weight:bold;

}

.footer{

background:#0d6efd;

color:white;

padding:15px;

text-align:center;

margin-top:40px;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="#">

❤️ Heart Disease Prediction System

</a>

</div>

</nav>

<div class="hero">

<h1>AI Based Heart Disease Prediction</h1>

<p>Predict Heart Disease Using Machine Learning</p>

</div>

<div class="container">

<div class="card">

<form action="/predict" method="POST">
<div class="row">

<div class="col-md-6">
<label>Age</label>
<input type="number" class="form-control" name="age" required>
</div>

<div class="col-md-6">
<label>Gender</label>
<select class="form-control" name="sex" required>
<option value="">Select Gender</option>
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div class="col-md-6">
<label>Chest Pain Type</label>
<select class="form-control" name="cp" required>
<option value="">Select</option>
<option value="0">Typical Angina</option>
<option value="1">Atypical Angina</option>
<option value="2">Non-Anginal Pain</option>
<option value="3">Asymptomatic</option>
</select>
</div>

<div class="col-md-6">
<label>Resting Blood Pressure</label>
<input type="number" class="form-control" name="trestbps" required>
</div>

<div class="col-md-6">
<label>Cholesterol</label>
<input type="number" class="form-control" name="chol" required>
</div>

<div class="col-md-6">
<label>Fasting Blood Sugar (>120)</label>
<select class="form-control" name="fbs" required>
<option value="">Select</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="col-md-6">
<label>Rest ECG</label>
<select class="form-control" name="restecg" required>
<option value="">Select</option>
<option value="0">Normal</option>
<option value="1">ST-T Wave Abnormality</option>
<option value="2">Left Ventricular Hypertrophy</option>
</select>
</div>

<div class="col-md-6">
<label>Maximum Heart Rate</label>
<input type="number" class="form-control" name="thalach" required>
</div>

<div class="col-md-6">
<label>Exercise Induced Angina</label>
<select class="form-control" name="exang" required>
<option value="">Select</option>
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

<div class="col-md-6">
<label>Old Peak</label>
<input type="number" step="0.1" class="form-control" name="oldpeak" required>
</div>

<div class="col-md-6">
<label>Slope</label>
<select class="form-control" name="slope" required>
<option value="">Select</option>
<option value="0">Upsloping</option>
<option value="1">Flat</option>
<option value="2">Downsloping</option>
</select>
</div>

<div class="col-md-6">
<label>Major Vessels (CA)</label>
<select class="form-control" name="ca" required>
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>
</div>

<div class="col-md-12">
<label>Thal</label>
<select class="form-control" name="thal" required>
<option value="">Select</option>
<option value="1">Normal</option>
<option value="2">Fixed Defect</option>
<option value="3">Reversible Defect</option>
</select>
</div>

<div class="col-md-12 mt-4">
<button type="submit" class="btn btn-primary">
🔍 Predict Heart Disease
</button>
</div>

</div>
{% if prediction %}
<div class="result alert alert-info mt-4">
    {{ prediction }}
</div>
{% endif %}

</form>

</div>

</div>

<footer class="footer">
    <p>© 2026 Heart Disease Prediction System | Developed by Indrakesh Kumar Goyal</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
